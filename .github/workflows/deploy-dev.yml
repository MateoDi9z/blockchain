name: Deploy to Main

on:
  push:
    branches: [ release ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ========== VERSIONING ==========
  versioning:
    uses: ./.github/workflows/versioning.yml
    secrets: inherit

  # ========== BUILD & DEPLOY ==========
  build-and-deploy-dev:
    needs: versioning
    runs-on: ubuntu-latest
    environment: Main

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # ========== BUILD GRADLE ==========
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
